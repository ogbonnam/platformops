name: Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install ansible ansible-lint yamllint

      - run: |
          yamllint .

      - run: |
          ansible-lint

        env:
          ANSIBLE_ROLES_PATH: ./ansible/roles
