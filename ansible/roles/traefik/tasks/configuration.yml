---
- name: Deploy Traefik configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_settings.directories.config }}/traefik.yml"
    owner: "{{ global_platform.user }}"
    group: "{{ global_platform.group }}"
    mode: "0644"
  notify: Recreate Traefik Container

- name: Create ACME storage file
  ansible.builtin.file:
    path: "{{ traefik_settings.directories.data }}/acme.json"
    state: touch
    owner: "{{ global_platform.user }}"
    group: "{{ global_platform.group }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve
