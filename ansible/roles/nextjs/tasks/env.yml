---
- name: Render runtime environment file configuration specs
  ansible.builtin.template:
    src: env.j2
    dest: "{{ global_platform.data_root }}/{{ company.short_name | default('platformops') }}/nextjs/.env"
    owner: "{{ global_platform.user }}"
    group: "{{ global_platform.group }}"
    mode: "0600"
  notify: Restart Nextjs application container
