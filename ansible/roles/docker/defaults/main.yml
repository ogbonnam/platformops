---
platform:
  user: platformops

docker:
  apt_repository: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

  packages:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

  network:
    name: platform-network
    driver: bridge

  daemon:
    log_driver: json-file
    max_size: "10m"
    max_file: "5"
