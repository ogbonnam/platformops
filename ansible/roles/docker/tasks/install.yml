---
- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_settings.packages }}"
    state: present

- name: Ensure Docker service is enabled
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add platform user to docker group
  ansible.builtin.user:
    name: "{{ docker_platform.user }}"
    groups: docker
    append: true
